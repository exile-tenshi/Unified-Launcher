<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Tenshi</title>
    <link rel="icon" type="image/png" href="tenshi_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --text-main: #ffffff;
            --text-muted: #a1a5b6;
            --accent-blue: #5865F2;
            --glass-bg: rgba(30, 31, 34, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        .glass-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at bottom, #111218 0%, #0b0c10 100%);
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            background: transparent;
        }

        .orb-1 {
            width: 500px; height: 500px;
            top: -150px; left: -100px;
            box-shadow: 0 0 200px 80px rgba(88, 101, 242, 0.15);
        }

        .orb-2 {
            width: 400px; height: 400px;
            bottom: -100px; right: -50px;
            box-shadow: 0 0 200px 80px rgba(88, 101, 242, 0.1);
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 60px 48px;
            text-align: center;
            max-width: 480px;
            width: 90%;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 96px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #5865F2, #a5aeff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .btn-home {
            display: inline-block;
            background: var(--accent-blue);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 14px;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            transition: opacity 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-home:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="glass-background">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="card">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn-home">Back to Tenshi</a>
    </div>
</body>
</html>
