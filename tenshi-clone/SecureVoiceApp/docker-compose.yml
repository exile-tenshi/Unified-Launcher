version: '3.8'

# Optional malware scanning: docker compose --profile clamav up -d
# Then set env on tenshi-server: CLAMAV_CLAMD_HOST=clamav CLAMAV_CLAMD_PORT=3310

services:
  clamav:
    profiles: ["clamav"]
    image: clamav/clamav:latest
    restart: unless-stopped

  tenshi-server:
    build: .
    container_name: tenshi-backend
    restart: unless-stopped
    ports:
      - "6000:6000"
      - "6001:6001"
    environment:
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL}
    volumes:
      # Mount persistence files so user data isn't lost if the container restarts
      - ./server_registry.json:/app/server_registry.json
      - ./servers.json:/app/servers.json
