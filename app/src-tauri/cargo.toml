[package]
name = "unified-game-library"
version = "1.0.1"
edition = "2021"

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-notification = "2"
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
os_info = "3"
hostname = "0.4"
regex = "1"

[build-dependencies]
tauri-build = { version = "2", features = [] }
